<!doctype html>
<html lang="en">
  <head>
    <title>Color Flipper</title>
    <style>
        #red{background-color: red;

        }
        #green{background-color: green;

        }
        #blue{background-color: blue;

        }
        button{
            border-radius: 5px;
            width: 100px;
            height: 40px;
            margin: 3px;
            
        }
    </style>
  </head>
  <body>
    <h3>Color Flipper</h3>
    <button id="green" onclick="colorChanger('green')">Green</button>
    <button id="red" onclick="colorChanger('red')">Red</button>
    <button id="blue" onclick="colorChanger('blue')">Blue</button>
    <button id="random" onclick="randomColor()">Random</button>
    <script src="index.js"></script>
  </body> 
</html>
